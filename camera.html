<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignAI | Final Integration</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Το παραθυράκι της κάμερας */
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 220px; border-radius: 12px; overflow: hidden; border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 10; background: black; }
        #input_video { width: 100%; height: auto; transform: scaleX(-1); display: block; }
        
        /* Μενού και Υπότιτλοι */
        #ui-layer { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; width: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #subtitle { font-size: 24px; color: #333; background: rgba(255, 255, 255, 0.95); padding: 15px 30px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 300px;}
        select { padding: 10px 20px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: bold;}
        
        /* Κατάσταση Σύνδεσης */
        #connection-status { position: absolute; top: 20px; right: 20px; padding: 10px 20px; border-radius: 50px; font-weight: bold; z-index: 10; transition: 0.3s;}
        .online { background: #4CAF50; color: white; }
        .offline { background: #f44336; color: white; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="connection-status" class="offline">Εγκέφαλος: Αποσυνδεδεμένος</div>
    <div id="video-container"><video id="input_video" autoplay playsinline></video></div>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Ενεργοποίηση Κάμερας...</div>
        <select id="avatar-select" onchange="loadAvatar(this.value)">
            <option value="updated_model.glb">Avatar: Rhea</option>
            <option value="titan.glb">Avatar: Titan</option>
        </select>
    </div>

    <script>
        // --- 1. ΡΥΘΜΙΣΕΙΣ THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 10, 5); scene.add(light);

        let currentModel = null, bones = {}, is_busy = false, isTitan = false;

        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        // Συνάρτηση για φόρτωση του Αβατάρ (Rhea ή Titan)
        function loadAvatar(file) {
            isTitan = file.includes('titan');
            loader.load(file, (gltf) => {
                if (currentModel) scene.remove(currentModel);
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0);
                scene.add(currentModel);
                
                // Ξαναδιαβάζουμε τα κόκαλα για το νέο αβατάρ
                bones = { r_fingers: [], l_fingers: [], r_joints: {}, l_joints: {} };
                currentModel.traverse(n => {
                    if (n.isBone) {
                        const bName = n.name.toLowerCase();
                        if (bName.includes('jaw')) bones.jaw = n;
                        if (bName.includes('rightarm')) bones.r_shoulder = n;
                        if (bName.includes('rightforearm')) bones.r_elbow = n;
                        if (bName.includes('righthand')) bones.r_wrist = n;
                    }
                });
                console.log("Φορτώθηκε το Αβατάρ:", file);
            });
        }
        
        // Αρχική φόρτωση της Rhea
        loadAvatar('updated_model.glb');

        // --- 2. ΣΥΝΔΕΣΗ ΜΕ ΤΟ RENDER (ΤΟΝ ΕΓΚΕΦΑΛΟ) ---
        const socket = io("https://sign-ai-server.onrender.com");
        
        socket.on('connect', () => {
            document.getElementById("connection-status").innerText = "Εγκέφαλος: Συνδεδεμένος";
            document.getElementById("connection-status").className = "online";
        });

        socket.on('new_sign', (data) => {
            const word = data.word;
            document.getElementById("subtitle").innerText = "Αναγνώριση: " + word.toUpperCase();
            
            if (!is_busy) {
                is_busy = true;
                
                // ΕΔΩ ΜΠΑΙΝΟΥΝ ΟΙ ΚΙΝΗΣΕΙΣ ΣΟΥ ΑΝΑΛΟΓΑ ΤΗ ΛΕΞΗ
                if (word === 'efharisto') gesture_efcharisto();
                else if (word === 'kalimera') gesture_kalimera();
                else if (word === 'kalo_mesimeri') gesture_mesimeri();
                // Αν δεν έχει κίνηση, το ελευθερώνει αμέσως
                else {
                    setTimeout(() => { is_busy = false; }, 2000);
                }
            }
        });

        // --- (ΕΔΩ ΒΑΖΕΙΣ ΤΙΣ ΣΥΝΑΡΤΗΣΕΙΣ ΚΙΝΗΣΗΣ ΣΟΥ ΠΧ. gesture_efcharisto) ---
        function gesture_efcharisto() {
            // Ο δικός σου κώδικας για το Ευχαριστώ
            console.log("Παίζει το Ευχαριστώ!");
            
            // Στο τέλος της κίνησης πρέπει να ελευθερώνει το σύστημα
            setTimeout(() => { 
                is_busy = false; 
                document.getElementById("subtitle").innerText = "Περιμένω κίνηση...";
            }, 2000); // Άλλαξε τα 2 δευτερόλεπτα με τον χρόνο που διαρκεί η κίνησή σου
        }
        function gesture_kalimera() { console.log("Παίζει Καλημέρα"); setTimeout(() => { is_busy = false; }, 2000); }
        function gesture_mesimeri() { console.log("Παίζει Μεσημέρι"); setTimeout(() => { is_busy = false; }, 2000); }


        // --- 3. MEDIAPIPE (ΤΑ ΜΑΤΙΑ ΤΟΥ BROWSER) ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        let lastEmitTime = 0;
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const now = Date.now();
                if (now - lastEmitTime > 100) { // Στέλνει 10 φορές το δευτερόλεπτο
                    const landmarks = results.multiHandLandmarks[0].map(lm => ({ x: lm.x, y: lm.y, z: lm.z }));
                    socket.emit('process_landmarks', { landmarks: landmarks });
                    lastEmitTime = now;
                }
            }
        });

        const camera_mp = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 320,
            height: 240
        });
        
        camera_mp.start().then(() => {
            document.getElementById("subtitle").innerText = "Κάνε μια κίνηση!";
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
